eholder=\"🔍 Search...\" oninput=\"filterMyWork()\" style=\"width:160px\"/\u003e\n                \u003cselect class=\"fsel\" id=\"mw-brand-filter\" onchange=\"filterMyWork()\" style=\"width:140px;font-size:12px\"\u003e\u003coption value=\"\"\u003eAll brands\u003c/option\u003e\u003c/select\u003e\n              \u003c/div\u003e\n            \u003c/div\u003e\n            \u003cdiv style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:0\"\u003e\n              \u003cdiv style=\"padding:8px 12px;border-bottom:2px solid var(--text3)\"\u003e\u003cspan style=\"font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em\"\u003eTO DO\u003c/span\u003e \u003cspan id=\"mw-count-todo\" style=\"font-size:10px;color:var(--text3);margin-left:4px\"\u003e\u003c/span\u003e\u003c/div\u003e\n              \u003cdiv style=\"padding:8px 12px;border-bottom:2px solid var(--blue)\"\u003e\u003cspan style=\"font-size:10px;font-weight:700;color:var(--blue);letter-spacing:.08em\"\u003eIN PROGRESS\u003c/span\u003e \u003cspan id=\"mw-count-inprogress\" style=\"font-size:10px;color:var(--blue);margin-left:4px\"\u003e\u003c/span\u003e\u003c/div\u003e\n              \u003cdiv style=\"padding:8px 12px;border-bottom:2px solid var(--amber)\"\u003e\u003cspan style=\"font-size:10px;font-weight:700;color:var(--amber);letter-spacing:.08em\"\u003eREVIEW\u003c/span\u003e \u003cspan id=\"mw-count-review\" style=\"font-size:10px;color:var(--amber);margin-left:4px\"\u003e\u003c/span\u003e\u003c/div\u003e\n              \u003cdiv style=\"padding:8px 12px;border-bottom:2px solid var(--green)\"\u003e\u003cspan style=\"font-size:10px;font-weight:700;color:var(--green);letter-spacing:.08em\"\u003eCOMPLETED\u003c/span\u003e \u003cspan id=\"mw-count-completed\" style=\"font-size:10px;color:var(--green);margin-left:4px\"\u003e\u003c/span\u003e\u003c/div\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:10px 20px 20px;flex:1;overflow-y:auto;align-items:start\"\u003e\n            \u003cdiv id=\"mw-col-todo\" style=\"display:flex;flex-direction:column;gap:8px\"\u003e\u003c/div\u003e\n            \u003cdiv id=\"mw-col-inprogress\" style=\"display:flex;flex-direction:column;gap:8px\"\u003e\u003c/div\u003e\n            \u003cdiv id=\"mw-col-review\" style=\"display:flex;flex-direction:column;gap:8px\"\u003e\u003c/div\u003e\n            \u003cdiv id=\"mw-col-completed\" style=\"display:flex;flex-direction:column;gap:8px\"\u003e\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv id=\"mw-detail-overlay\" style=\"display:none;position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(3px);z-index:50;padding:20px;overflow-y:auto\" onclick=\"if(event.target===this)closeMWDetail()\"\u003e\n            \u003cdiv id=\"mw-detail-panel\" style=\"background:var(--bg2);border:.5px solid var(--border2);border-radius:var(--rlg);max-width:560px;margin:0 auto;animation:slideUp .25s ease\"\u003e\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n\n      \u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\n  \u003c!-- ═══════ MODALS ═══════ --\u003e\n  \u003cdiv class=\"moverlay\" id=\"modal-overlay\" onclick=\"closeModalOutside(event)\"\u003e\n\n    \u003c!-- Logout --\u003e\n    \u003cdiv class=\"modal sm\" id=\"modal-logout\"\u003e\u003cdiv class=\"modal-p\"\u003e\u003cdiv class=\"mtit\"\u003eSign out?\u003c/div\u003e\u003cdiv class=\"msub\"\u003eYou'll be returned to the login screen.\u003c/div\u003e\u003cdiv class=\"macts\"\u003e\u003cbutton class=\"mbtn c\" onclick=\"closeModal()\"\u003eCancel\u003c/button\u003e\u003cbutton class=\"mbtn ok\" onclick=\"doLogout()\"\u003eSign out\u003c/button\u003e\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e\n\n    \u003c!-- Prompt: view / copy --\u003e\n    \u003cdiv class=\"modal md\" id=\"modal-prompt-view\"\u003e\u003cdiv class=\"modal-p\" id=\"modal-prompt-view-body\"\u003e\u003c/div\u003e\u003c/div\u003e\n\n    \u003c!-- Prompt: add / edit --\u003e\n    \u003cdiv class=\"modal md\" id=\"modal-prompt-edit\"\u003e\u003cdiv class=\"modal-p\"\u003e\n      \u003cdiv class=\"mtit\" id=\"prompt-edit-title\"\u003eAdd prompt\u003c/div\u003e\n      \u003cdiv class=\"msub\"\u003eShare a reusable prompt with your team.\u003c/div\u003e\n      \u003cinput type=\"hidden\" id=\"pe-id\"/\u003e\n      \u003cdiv class=\"form-row\"\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eTitle * \u003cspan id=\"pe-title-count\" style=\"color:var(--text3);font-weight:400;float:right\"\u003e0 / 100\u003c/span\u003e\u003c/label\u003e\u003cinput class=\"finp\" id=\"pe-title\" maxlength=\"100\" placeholder=\"e.g. Landing page hero copy\" oninput=\"document.getElementById('pe-title-count').textContent=this.value.length+' / 100'\"/\u003e\u003c/div\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eCategory *\u003c/label\u003e\u003cselect class=\"fsel\" id=\"pe-category\"\u003e\u003c/select\u003e\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-row full\"\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eDescription \u003cspan id=\"pe-desc-count\" style=\"color:var(--text3);font-weight:400;float:right\"\u003e0 / 200\u003c/span\u003e\u003c/label\u003e\u003ctextarea class=\"ftxt\" id=\"pe-desc\" maxlength=\"200\" style=\"min-height:60px\" placeholder=\"When and how to use this prompt.\" oninput=\"document.getElementById('pe-desc-count').textContent=this.value.length+' / 200'\"\u003e\u003c/textarea\u003e\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-row full\"\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003ePrompt content *\u003c/label\u003e\u003ctextarea class=\"ftxt\" id=\"pe-content\" style=\"min-height:150px;font-family:var(--mono);font-size:12px;line-height:1.55\" placeholder=\"Paste the full prompt here...\"\u003e\u003c/textarea\u003e\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-row full\"\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eTags (comma-separated, max 5)\u003c/label\u003e\u003cinput class=\"finp\" id=\"pe-tags\" placeholder=\"e.g. b2b, landing-page, gpt-4\"/\u003e\u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003cdiv class=\"form-row full\"\u003e\n        \u003cdiv class=\"fg2\"\u003e\n          \u003clabel class=\"flbl\"\u003eAttachments \u003cspan style=\"color:var(--text3);font-weight:400\"\u003ePDF · DOC · XLS · PPT · max 10 MB each\u003c/span\u003e\u003c/label\u003e\n          \u003cdiv id=\"pe-dropzone\" style=\"border:1.5px dashed var(--border2);border-radius:var(--rsm);padding:14px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s\"\u003e\n            \u003cinput type=\"file\" id=\"pe-file-input\" multiple accept=\".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation\" style=\"display:none\"/\u003e\n            \u003cdiv style=\"font-size:24px;opacity:.5;margin-bottom:4px\"\u003e📎\u003c/div\u003e\n            \u003cdiv style=\"font-size:12px;font-weight:500;color:var(--text2)\"\u003eDrag \u0026amp; drop files or \u003cspan style=\"color:var(--accent2);text-decoration:underline\"\u003eclick to browse\u003c/span\u003e\u003c/div\u003e\n            \u003cdiv style=\"font-size:10px;color:var(--text3);margin-top:2px\"\u003eMulti-select allowed\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv id=\"pe-attachments\" style=\"margin-top:8px;display:flex;flex-direction:column;gap:5px\"\u003e\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003cdiv class=\"macts\"\u003e\n        \u003cbutton class=\"mbtn c\" onclick=\"closeModal()\"\u003eCancel\u003c/button\u003e\n        \u003cbutton class=\"mbtn ok\" onclick=\"savePrompt()\" id=\"pe-submit\"\u003eSave prompt\u003c/button\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\u003c/div\u003e\n\n    \u003c!-- Prompt: confirm delete --\u003e\n    \u003cdiv class=\"modal sm\" id=\"modal-prompt-delete\"\u003e\u003cdiv class=\"modal-p\"\u003e\n      \u003cdiv class=\"mtit\"\u003eDelete this prompt?\u003c/div\u003e\n      \u003cdiv class=\"msub\" id=\"prompt-delete-sub\"\u003eThis cannot be undone.\u003c/div\u003e\n      \u003cdiv class=\"macts\"\u003e\n        \u003cbutton class=\"mbtn c\" onclick=\"closeModal()\"\u003eCancel\u003c/button\u003e\n        \u003cbutton class=\"mbtn d\" onclick=\"confirmDeletePrompt()\"\u003eDelete prompt\u003c/button\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\u003c/div\u003e\n\n    \u003c!-- Prompt: category manager (super-admin) --\u003e\n    \u003cdiv class=\"modal md\" id=\"modal-prompt-categories\"\u003e\u003cdiv class=\"modal-p\"\u003e\n      \u003cdiv class=\"mtit\"\u003eManage prompt categories\u003c/div\u003e\n      \u003cdiv class=\"msub\"\u003eAdd, edit or remove categories. Categories with prompts can't be deleted.\u003c/div\u003e\n      \u003cdiv id=\"pcat-list\" style=\"margin-bottom:14px\"\u003e\u003c/div\u003e\n      \u003cdiv style=\"background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--rsm);padding:14px;margin-bottom:8px\"\u003e\n        \u003cdiv class=\"form-row\" style=\"margin-bottom:8px\"\u003e\n          \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eIcon\u003c/label\u003e\u003cinput class=\"finp\" id=\"pcat-new-icon\" maxlength=\"4\" placeholder=\"🧠\"/\u003e\u003c/div\u003e\n          \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eName *\u003c/label\u003e\u003cinput class=\"finp\" id=\"pcat-new-name\" placeholder=\"e.g. Research\"/\u003e\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"form-row full\" style=\"margin-bottom:8px\"\u003e\n          \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eDescription\u003c/label\u003e\u003cinput class=\"finp\" id=\"pcat-new-desc\" placeholder=\"When this category is used\"/\u003e\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cbutton class=\"mbtn ok\" style=\"font-size:12px\" onclick=\"addPromptCategory()\"\u003e+ Add category\u003c/button\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"macts\"\u003e\u003cbutton class=\"mbtn c\" onclick=\"closeModal()\"\u003eDone\u003c/button\u003e\u003c/div\u003e\n    \u003c/div\u003e\u003c/div\u003e\n\n    \u003c!-- Add brand --\u003e\n    \u003cdiv class=\"modal md\" id=\"modal-add-brand\"\u003e\u003cdiv class=\"modal-p\"\u003e\n      \u003cdiv class=\"mtit\"\u003eAdd new brand\u003c/div\u003e\u003cdiv class=\"msub\"\u003eSet up team, ownership and brand workspace.\u003c/div\u003e\n\n      \u003c!-- Basic info --\u003e\n      \u003cdiv class=\"form-row\"\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eBrand name *\u003c/label\u003e\u003cinput class=\"finp\" id=\"nb-name\" placeholder=\"e.g. AutoDrive\"/\u003e\u003c/div\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eIndustry *\u003c/label\u003e\u003cinput class=\"finp\" id=\"nb-industry\" placeholder=\"e.g. Automotive\"/\u003e\u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003c!-- SAM assignment --\u003e\n      \u003cdiv style=\"font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 8px\"\u003eTeam\u003c/div\u003e\n      \u003cdiv class=\"form-row\"\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003ePrimary SAM *\u003c/label\u003e\u003cselect class=\"fsel\" id=\"nb-primary-sam\"\u003e\u003coption value=\"\"\u003eSelect SAM\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eSecondary SAM\u003c/label\u003e\u003cselect class=\"fsel\" id=\"nb-secondary-sam\"\u003e\u003coption value=\"\"\u003eOptional\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-row\"\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eSEO Owner\u003c/label\u003e\u003cselect class=\"fsel\" id=\"nb-seo-owner\"\u003e\u003coption value=\"\"\u003eOptional\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eCreative Owner\u003c/label\u003e\u003cselect class=\"fsel\" id=\"nb-creative-owner\"\u003e\u003coption value=\"\"\u003eOptional\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-row\"\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eVideo Owner\u003c/label\u003e\u003cselect class=\"fsel\" id=\"nb-video-owner\"\u003e\u003coption value=\"\"\u003eOptional\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eBusiness Manager\u003c/label\u003e\u003cselect class=\"fsel\" id=\"nb-biz-manager\"\u003e\u003coption value=\"\"\u003eOptional\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003c!-- Ownership --\u003e\n      \u003cdiv style=\"font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 8px\"\u003eOwnership\u003c/div\u003e\n      \u003cdiv class=\"form-row\"\u003e\n        \u003cdiv class=\"fg2\"\u003e\n          \u003clabel class=\"flbl\"\u003eBrand Owner\u003c/label\u003e\n          \u003cselect class=\"fsel\" id=\"nb-brand-owner-type\" onchange=\"toggleOwnerFields()\"\u003e\n            \u003coption value=\"none\"\u003eNo owner yet\u003c/option\u003e\n            \u003coption value=\"existing\"\u003eSelect existing member\u003c/option\u003e\n            \u003coption value=\"new\"\u003eCreate new login\u003c/option\u003e\n          \u003c/select\u003e\n          \u003cdiv id=\"nb-owner-member-wrap\" style=\"display:none;margin-top:6px\"\u003e\u003cselect class=\"fsel\" id=\"nb-owner-member\"\u003e\u003c/select\u003e\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"fg2\"\u003e\n          \u003clabel class=\"flbl\"\u003eCo-Owner\u003c/label\u003e\n          \u003cselect class=\"fsel\" id=\"nb-co-owner-type\" onchange=\"toggleCoOwnerFields()\"\u003e\n            \u003coption value=\"none\"\u003eNo co-owner yet\u003c/option\u003e\n            \u003coption value=\"existing\"\u003eSelect existing member\u003c/option\u003e\n          \u003c/select\u003e\n          \u003cdiv id=\"nb-co-owner-member-wrap\" style=\"display:none;margin-top:6px\"\u003e\u003cselect class=\"fsel\" id=\"nb-co-owner-member\"\u003e\u003c/select\u003e\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003c!-- New owner credentials (shown when \"Create new login\" picked) --\u003e\n      \u003cdiv id=\"nb-owner-new-wrap\" style=\"display:none;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--rsm);padding:12px;margin-top:8px\"\u003e\n        \u003cdiv style=\"font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px\"\u003eNew owner login\u003c/div\u003e\n        \u003cdiv class=\"form-row\"\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eFull name *\u003c/label\u003e\u003cinput class=\"finp\" id=\"nb-client-name\" placeholder=\"e.g. Rahul Gupta\"/\u003e\u003c/div\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eEmail *\u003c/label\u003e\u003cinput class=\"finp\" id=\"nb-client-email\" placeholder=\"e.g. rahul@brand.com\"/\u003e\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"form-row\"\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eUsername\u003c/label\u003e\u003cinput class=\"finp\" id=\"nb-client-user\" placeholder=\"e.g. rahul01\"/\u003e\u003c/div\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\" style=\"display:flex;justify-content:space-between\"\u003ePassword \u003cspan style=\"color:var(--accent2);cursor:pointer;font-weight:400\" onclick=\"regenCreds('nb')\"\u003e↻ Regenerate\u003c/span\u003e\u003c/label\u003e\u003cinput class=\"finp\" id=\"nb-client-pass\" placeholder=\"min 6 chars\"/\u003e\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv style=\"font-size:11px;color:var(--amber);padding:8px;background:var(--ambg);border:.5px solid var(--amborder);border-radius:var(--rsm)\"\u003e📋 Copy these credentials before saving — share with client\u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003cdiv class=\"macts\"\u003e\u003cbutton class=\"mbtn c\" onclick=\"closeModal()\"\u003eCancel\u003c/button\u003e\u003cbutton class=\"mbtn ok\" onclick=\"saveBrand()\"\u003eCreate brand →\u003c/button\u003e\u003c/div\u003e\n    \u003c/div\u003e\u003c/div\u003e\n\n    \u003c!-- Edit brand --\u003e\n    \u003cdiv class=\"modal md\" id=\"modal-edit-brand\"\u003e\u003cdiv class=\"modal-p\"\u003e\n      \u003cdiv class=\"mtit\"\u003eEdit brand\u003c/div\u003e\u003cdiv class=\"msub\" id=\"edit-brand-sub\"\u003e\u003c/div\u003e\n\n      \u003cdiv class=\"form-row\"\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eBrand name *\u003c/label\u003e\u003cinput class=\"finp\" id=\"eb-name\"/\u003e\u003c/div\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eIndustry *\u003c/label\u003e\u003cinput class=\"finp\" id=\"eb-industry\"/\u003e\u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003cdiv style=\"font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 8px\"\u003eTeam\u003c/div\u003e\n      \u003cdiv class=\"form-row\"\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003ePrimary SAM *\u003c/label\u003e\u003cselect class=\"fsel\" id=\"eb-bm\"\u003e\u003c/select\u003e\u003c/div\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eSecondary SAM\u003c/label\u003e\u003cselect class=\"fsel\" id=\"eb-secondary-sam\"\u003e\u003coption value=\"\"\u003eOptional\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-row\"\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eSEO Owner\u003c/label\u003e\u003cselect class=\"fsel\" id=\"eb-seo-owner\"\u003e\u003coption value=\"\"\u003eOptional\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eCreative Owner\u003c/label\u003e\u003cselect class=\"fsel\" id=\"eb-creative-owner\"\u003e\u003coption value=\"\"\u003eOptional\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-row\"\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eVideo Owner\u003c/label\u003e\u003cselect class=\"fsel\" id=\"eb-video-owner\"\u003e\u003coption value=\"\"\u003eOptional\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eBusiness Manager\u003c/label\u003e\u003cselect class=\"fsel\" id=\"eb-biz-manager\"\u003e\u003coption value=\"\"\u003eOptional\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003cdiv style=\"font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 8px\"\u003eOwnership\u003c/div\u003e\n      \u003cdiv class=\"form-row\"\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eBrand Owner\u003c/label\u003e\u003cselect class=\"fsel\" id=\"eb-co-owner\"\u003e\u003coption value=\"\"\u003eNone\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\n        \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eCo-Owner\u003c/label\u003e\u003cselect class=\"fsel\" id=\"eb-co-owner2\"\u003e\u003coption value=\"\"\u003eNone\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003cdiv style=\"background:var(--bg3);border:.5px solid var(--border);border-radius:var(--rsm);padding:14px;margin:10px 0\"\u003e\n        \u003cdiv style=\"font-size:12px;font-weight:500;margin-bottom:4px;color:var(--text2)\"\u003e🔑 Client login access\u003c/div\u003e\n        \u003cdiv id=\"eb-current-client\" style=\"margin-bottom:10px\"\u003e\u003c/div\u003e\n        \u003cdiv class=\"form-row\" style=\"margin-bottom:8px\"\u003e\n          \u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eAction\u003c/label\u003e\n            \u003cselect class=\"fsel\" id=\"eb-owner-action\" onchange=\"toggleEditOwnerFields()\"\u003e\n              \u003coption value=\"keep\"\u003eKeep current\u003c/option\u003e\n              \u003coption value=\"existing\"\u003eAssign existing member\u003c/option\u003e\n              \u003coption value=\"new\"\u003eCreate new login\u003c/option\u003e\n              \u003coption value=\"remove\"\u003eRemove access\u003c/option\u003e\n            \u003c/select\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"fg2\" id=\"eb-owner-member-wrap\" style=\"display:none\"\u003e\u003clabel class=\"flbl\"\u003eSelect member\u003c/label\u003e\u003cselect class=\"fsel\" id=\"eb-owner-member\"\u003e\u003c/select\u003e\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv id=\"eb-owner-new-wrap\" style=\"display:none\"\u003e\n          \u003cdiv class=\"form-row\"\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eName *\u003c/label\u003e\u003cinput class=\"finp\" id=\"eb-client-name\" placeholder=\"e.g. Rahul Gupta\"/\u003e\u003c/div\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eEmail *\u003c/label\u003e\u003cinput class=\"finp\" id=\"eb-client-email\" placeholder=\"e.g. rahul@brand.com\"/\u003e\u003c/div\u003e\u003c/div\u003e\n          \u003cdiv class=\"form-row\"\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eUsername\u003c/label\u003e\u003cinput class=\"finp\" id=\"eb-client-user\" placeholder=\"e.g. rene or client01\"/\u003e\u003c/div\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\" style=\"display:flex;justify-content:space-between\"\u003ePassword \u003cspan style=\"color:var(--accent2);cursor:pointer;font-weight:400\" onclick=\"regenCreds('eb')\"\u003e↻ Regenerate\u003c/span\u003e\u003c/label\u003e\u003cinput class=\"finp\" id=\"eb-client-pass\" placeholder=\"e.g. pass1234 or your own\"/\u003e\u003c/div\u003e\u003c/div\u003e\n          \u003cdiv style=\"background:var(--ambg);border:.5px solid var(--amb);border-radius:var(--rsm);padding:9px 12px;font-size:11px;color:var(--amber)\"\u003e📋 Copy credentials before saving — share with client to log in\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"macts\"\u003e\u003cbutton class=\"mbtn c\" onclick=\"closeModal()\"\u003eCancel\u003c/button\u003e\u003cbutton class=\"mbtn ok\" onclick=\"updateBrand()\"\u003eSave changes\u003c/button\u003e\u003c/div\u003e\n    \u003c/div\u003e\u003c/div\u003e\n\n    \u003c!-- Delete brand --\u003e\n    \u003cdiv class=\"modal sm\" id=\"modal-delete-brand\"\u003e\u003cdiv class=\"modal-p\"\u003e\u003cdiv class=\"mtit\"\u003eDelete brand?\u003c/div\u003e\u003cdiv class=\"msub\" id=\"del-brand-sub\"\u003e\u003c/div\u003e\u003cdiv class=\"dbox\"\u003e⚠ This permanently deletes the brand, campaigns, assets and PIM data. Cannot be undone.\u003c/div\u003e\u003cdiv class=\"macts\"\u003e\u003cbutton class=\"mbtn c\" onclick=\"closeModal()\"\u003eCancel\u003c/button\u003e\u003cbutton class=\"mbtn d\" onclick=\"confirmDeleteBrand()\"\u003eDelete permanently\u003c/button\u003e\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e\n\n    \u003c!-- Archive brand --\u003e\n    \u003cdiv class=\"modal sm\" id=\"modal-archive-brand\"\u003e\u003cdiv class=\"modal-p\"\u003e\u003cdiv class=\"mtit\" id=\"arch-title\"\u003eArchive brand?\u003c/div\u003e\u003cdiv class=\"msub\" id=\"arch-sub\"\u003e\u003c/div\u003e\u003cdiv class=\"macts\"\u003e\u003cbutton class=\"mbtn c\" onclick=\"closeModal()\"\u003eCancel\u003c/button\u003e\u003cbutton class=\"mbtn a\" onclick=\"confirmArchive()\"\u003eArchive\u003c/button\u003e\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e\n\n    \u003c!-- Transfer brand --\u003e\n    \u003cdiv class=\"modal sm\" id=\"modal-transfer-brand\"\u003e\u003cdiv class=\"modal-p\"\u003e\u003cdiv class=\"mtit\"\u003eTransfer brand\u003c/div\u003e\u003cdiv class=\"msub\" id=\"transfer-sub\"\u003e\u003c/div\u003e\u003cdiv class=\"form-row full\"\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eTransfer to\u003c/label\u003e\u003cselect class=\"fsel\" id=\"transfer-to\"\u003e\u003c/select\u003e\u003c/div\u003e\u003c/div\u003e\u003cdiv class=\"macts\"\u003e\u003cbutton class=\"mbtn c\" onclick=\"closeModal()\"\u003eCancel\u003c/button\u003e\u003cbutton class=\"mbtn ok\" onclick=\"confirmTransfer()\"\u003eTransfer →\u003c/button\u003e\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e\n\n    \u003c!-- Add/Edit task --\u003e\n    \u003cdiv class=\"modal\" id=\"modal-add-task\"\u003e\u003cdiv class=\"modal-p\"\u003e\n      \u003cdiv class=\"mtit\" id=\"task-modal-title\"\u003eNew task\u003c/div\u003e\u003cdiv class=\"msub\" id=\"task-modal-sub\"\u003eFill in task details\u003c/div\u003e\n      \u003cdiv class=\"form-row\"\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eTask title *\u003c/label\u003e\u003cinput class=\"finp\" id=\"tk-title\" placeholder=\"e.g. Publish SMM post\"/\u003e\u003c/div\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eG7 type\u003c/label\u003e\u003cselect class=\"fsel\" id=\"tk-g7\"\u003e\u003coption value=\"\"\u003e— Select —\u003c/option\u003e\u003coption value=\"G1\"\u003eG1 — Brand guidelines / Sales kit\u003c/option\u003e\u003coption value=\"G2\"\u003eG2 — Website\u003c/option\u003e\u003coption value=\"G3\"\u003eG3 — SEO\u003c/option\u003e\u003coption value=\"G4\"\u003eG4 — Newsletter\u003c/option\u003e\u003coption value=\"G5\"\u003eG5 — Social Media\u003c/option\u003e\u003coption value=\"G6\"\u003eG6 — PR \u0026 Articles\u003c/option\u003e\u003coption value=\"G7\"\u003eG7 — Events\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\u003c/div\u003e\n      \u003cdiv class=\"form-row\"\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eBrand *\u003c/label\u003e\u003cselect class=\"fsel\" id=\"tk-brand\"\u003e\u003c/select\u003e\u003c/div\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eAssign to *\u003c/label\u003e\u003cselect class=\"fsel\" id=\"tk-assign\"\u003e\u003c/select\u003e\u003c/div\u003e\u003c/div\u003e\n      \u003cdiv class=\"form-row\"\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003ePriority\u003c/label\u003e\u003cselect class=\"fsel\" id=\"tk-priority\"\u003e\u003coption value=\"high\"\u003e🔴 High\u003c/option\u003e\u003coption value=\"medium\" selected\u003e🟡 Medium\u003c/option\u003e\u003coption value=\"low\"\u003e🟢 Low\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eDue date\u003c/label\u003e\u003cinput class=\"finp\" id=\"tk-due\" type=\"date\"/\u003e\u003c/div\u003e\u003c/div\u003e\n      \u003cdiv class=\"form-row\"\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eStage\u003c/label\u003e\u003cselect class=\"fsel\" id=\"tk-stage\"\u003e\u003coption value=\"todo\"\u003eTo do\u003c/option\u003e\u003coption value=\"inprogress\"\u003eIn progress\u003c/option\u003e\u003coption value=\"review\"\u003eIn review\u003c/option\u003e\u003coption value=\"approved\"\u003eApproved\u003c/option\u003e\u003coption value=\"onhold\"\u003eOn hold\u003c/option\u003e\u003coption value=\"completed\"\u003eCompleted\u003c/option\u003e\u003coption value=\"remark\"\u003eRemark\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eCampaign (optional)\u003c/label\u003e\u003cselect class=\"fsel\" id=\"tk-campaign\"\u003e\u003coption value=\"\"\u003e— None —\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\u003c/div\u003e\n      \u003cdiv class=\"form-row full\"\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eDescription / Notes\u003c/label\u003e\u003ctextarea class=\"ftxt\" id=\"tk-notes\" placeholder=\"Task details, context, requirements...\" style=\"min-height:60px\"\u003e\u003c/textarea\u003e\u003c/div\u003e\u003c/div\u003e\n      \u003cdiv class=\"form-row full\"\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eChallenges / Blockers\u003c/label\u003e\u003ctextarea class=\"ftxt\" id=\"tk-challenges\" placeholder=\"Any blockers or challenges to flag...\" style=\"min-height:50px\"\u003e\u003c/textarea\u003e\u003c/div\u003e\u003c/div\u003e\n      \u003cdiv class=\"macts\"\u003e\u003cbutton class=\"mbtn c\" onclick=\"closeModal()\"\u003eCancel\u003c/button\u003e\u003cbutton class=\"mbtn ok\" id=\"task-save-btn\" onclick=\"saveTask()\"\u003eCreate task →\u003c/button\u003e\u003c/div\u003e\n    \u003c/div\u003e\u003c/div\u003e\n\n    \u003c!-- Task detail --\u003e\n    \u003cdiv class=\"modal\" id=\"modal-task-detail\"\u003e\n      \u003cdiv class=\"td-header\"\u003e\n        \u003cdiv class=\"td-title-row\"\u003e\n          \u003cdiv class=\"td-title\" id=\"td-title\"\u003eTask name\u003c/div\u003e\n          \u003cbutton class=\"td-close\" onclick=\"closeModal()\"\u003e×\u003c/button\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"td-meta\" id=\"td-meta\"\u003e\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"td-body\"\u003e\n        \u003cdiv class=\"td-section\"\u003e\n          \u003cdiv class=\"td-sec-label\"\u003eStage \u0026 assignment\u003c/div\u003e\n          \u003cdiv class=\"td-field-row\"\u003e\n            \u003cdiv class=\"td-field\"\u003e\u003cdiv class=\"td-field-label\"\u003eCurrent stage\u003c/div\u003e\u003cselect class=\"stage-select\" id=\"td-stage\" onchange=\"updateTaskStage(this.value)\"\u003e\u003c/select\u003e\u003c/div\u003e\n            \u003cdiv class=\"td-field\"\u003e\u003cdiv class=\"td-field-label\"\u003eAssigned to\u003c/div\u003e\u003cdiv class=\"td-field-val\" id=\"td-assignee\"\u003e—\u003c/div\u003e\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"td-field-row\"\u003e\n            \u003cdiv class=\"td-field\"\u003e\u003cdiv class=\"td-field-label\"\u003eDue date\u003c/div\u003e\u003cdiv class=\"td-field-val\" id=\"td-due\"\u003e—\u003c/div\u003e\u003c/div\u003e\n            \u003cdiv class=\"td-field\"\u003e\u003cdiv class=\"td-field-label\"\u003ePriority\u003c/div\u003e\u003cdiv id=\"td-priority\"\u003e\u003c/div\u003e\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n        \u003c!-- Milestone dates from linked content piece --\u003e\n        \u003cdiv class=\"td-section\" id=\"td-milestones\" style=\"display:none\"\u003e\n          \u003cdiv class=\"td-sec-label\"\u003e📅 Milestone dates\u003c/div\u003e\n          \u003cdiv id=\"td-milestone-content\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px\"\u003e\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"td-section\"\u003e\n          \u003cdiv class=\"td-sec-label\"\u003eQuality score (reviewer)\u003c/div\u003e\n          \u003cdiv class=\"score-input\" id=\"td-score-input\"\u003e\u003c/div\u003e\n        \u003c/div\u003e\n        \u003c!-- Brief content from linked content piece --\u003e\n        \u003cdiv class=\"td-section\" id=\"td-brief-section\" style=\"display:none\"\u003e\n          \u003cdiv class=\"td-sec-label\"\u003e📋 Content brief\u003c/div\u003e\n          \u003cdiv id=\"td-brief-content\"\u003e\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"td-section\"\u003e\n          \u003cdiv class=\"td-sec-label\"\u003eNotes \u0026 description\u003c/div\u003e\n          \u003cdiv class=\"td-field-row full\"\u003e\u003cdiv class=\"td-field\"\u003e\u003ctextarea class=\"ftxt\" id=\"td-notes-edit\" placeholder=\"Add notes...\" style=\"min-height:60px\" oninput=\"updateTaskField('notes',this.value)\"\u003e\u003c/textarea\u003e\u003c/div\u003e\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"td-section\"\u003e\n          \u003cdiv class=\"td-sec-label\"\u003eChallenges / Blockers\u003c/div\u003e\n          \u003cdiv class=\"td-field-row full\"\u003e\u003cdiv class=\"td-field\"\u003e\u003ctextarea class=\"ftxt\" id=\"td-challenges-edit\" placeholder=\"Any blockers or challenges...\" style=\"min-height:50px\" oninput=\"updateTaskField('challenges',this.value)\"\u003e\u003c/textarea\u003e\u003c/div\u003e\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"td-section\"\u003e\n          \u003cdiv class=\"td-sec-label\"\u003eProof of work / Attachments\u003c/div\u003e\n          \u003cdiv id=\"td-files\"\u003e\u003c/div\u003e\n          \u003cbutton class=\"tbtn\" style=\"margin-top:8px;font-size:11px\" onclick=\"document.getElementById('task-file-input').click()\"\u003e+ Attach file\u003c/button\u003e\n        \u003c/div\u003e\n        \u003cdiv id=\"td-bm-actions\" style=\"display:none\"\u003e\n          \u003cdiv style=\"font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px\"\u003eSAM actions\u003c/div\u003e\n          \u003cdiv style=\"display:flex;gap:8px;flex-wrap:wrap\"\u003e\n            \u003cbutton class=\"btn\" style=\"background:var(--gnbg);border-color:var(--gnb);color:var(--green)\" onclick=\"bmApproveTaskDirect()\"\u003e✅ Approve directly\u003c/button\u003e\n            \u003cbutton class=\"btn\" style=\"background:var(--ambg);border-color:var(--amborder);color:var(--amber)\" onclick=\"bmSendTaskToOwner()\"\u003e📤 Send to owner\u003c/button\   \u003c!-- SAM deadline extension approvals --\u003e\n        \u003cdiv id=\"td-deadline-requests\" style=\"display:none\"\u003e\u003c/div\u003e\n        \u003cdiv id=\"td-completion-note\" style=\"display:none;background:var(--tbg);border:.5px solid rgba(45,212,191,.25);border-radius:var(--rsm);padding:10px 12px;margin-bottom:4px\"\u003e\u003c/div\u003e\n        \u003cdiv class=\"td-section\"\u003e\n          \u003cdiv class=\"td-sec-label\"\u003e💬 Comments\u003c/div\u003e\n          \u003cdiv id=\"td-comments\" style=\"max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:10px\"\u003e\u003c/div\u003e\n          \u003cdiv style=\"display:flex;gap:8px\"\u003e\n            \u003ctextarea id=\"td-comment-input\" class=\"ftxt\" placeholder=\"Write a message...\" style=\"min-height:40px;max-height:80px;flex:1;font-size:12px;resize:none\"\u003e\u003c/textarea\u003e\n            \u003cbutton class=\"btn btn-p btn-sm\" style=\"align-self:flex-end;flex-shrink:0\" onclick=\"addTaskComment()\"\u003eSend\u003c/button\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv style=\"display:flex;gap:8px;margin-top:4px;flex-wrap:wrap\"\u003e\n          \u003cbutton class=\"btn btn-p\" onclick=\"saveTaskDetail()\"\u003eSave changes\u003c/button\u003e\n          \u003cbutton class=\"btn btn-s\" onclick=\"closeModal()\"\u003eClose\u003c/button\u003e\n          \u003cbutton id=\"td-inline-reassign-btn\" class=\"btn btn-s\" style=\"display:none\" onclick=\"openInlineReassign()\"\u003e👤 Reassign\u003c/button\u003e\n          \u003cbutton id=\"td-deadline-ext-btn\" class=\"btn btn-s\" style=\"display:none;margin-left:auto\" onclick=\"openDeadlineExtension()\"\u003e📅 Request deadline extension\u003c/button\u003e\n        \u003c/div\u003e\n        \u003c!-- Inline reassign form --\u003e\n        \u003cdiv id=\"td-inline-reassign-box\" style=\"display:none;margin-top:10px;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--rsm);padding:14px\"\u003e\n          \u003cdiv style=\"font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px\"\u003e👤 Reassign task\u003c/div\u003e\n          \u003cdiv style=\"margin-bottom:10px\"\u003e\n            \u003clabel class=\"flbl\"\u003eAssign to\u003c/label\u003e\n            \u003cselect class=\"fsel\" id=\"td-inline-reassign-select\" style=\"font-size:13px\"\u003e\u003c/select\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"margin-bottom:10px\"\u003e\n            \u003clabel class=\"flbl\"\u003eComment \u003cspan style=\"color:var(--text3);font-weight:400\"\u003e(optional — will be added to comments)\u003c/span\u003e\u003c/label\u003e\n            \u003ctextarea id=\"td-inline-reassign-comment\" class=\"ftxt\" placeholder=\"e.g. Passing this to Arjun — better suited for video work\" style=\"min-height:50px;font-size:12px\"\u003e\u003c/textarea\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"display:flex;gap:6px\"\u003e\n            \u003cbutton class=\"btn btn-p btn-sm\" onclick=\"confirmInlineReassign()\"\u003eReassign →\u003c/button\u003e\n            \u003cbutton class=\"btn btn-s btn-sm\" onclick=\"document.getElementById('td-inline-reassign-box').style.display='none'\"\u003eCancel\u003c/button\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n        \u003c!-- Deadline extension form --\u003e\n        \u003cdiv id=\"td-deadline-ext-box\" style=\"display:none;margin-top:10px;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--rsm);padding:12px\"\u003e\n          \u003cdiv style=\"font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px\"\u003e📅 Request deadline extension\u003c/div\u003e\n          \u003cdiv style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px\"\u003e\n            \u003cdiv\u003e\u003clabel class=\"flbl\"\u003eProposed new date\u003c/label\u003e\u003cinput class=\"finp\" type=\"date\" id=\"td-ext-date\" style=\"font-size:12px\"/\u003e\u003c/div\u003e\n          \u003c/div\u003e\n          \u003ctextarea id=\"td-ext-reason\" class=\"ftxt\" placeholder=\"Reason for extension request... (SAM will review)\" style=\"min-height:60px;font-size:12px;margin-bottom:8px\"\u003e\u003c/textarea\u003e\n          \u003cdiv style=\"display:flex;gap:6px\"\u003e\n            \u003cbutton class=\"btn btn-p btn-sm\" onclick=\"submitDeadlineExtension()\"\u003eSend request →\u003c/button\u003e\n            \u003cbutton class=\"btn btn-s btn-sm\" onclick=\"document.getElementById('td-deadline-ext-box').style.display='none'\"\u003eCancel\u003c/button\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003c!-- Add member --\u003e\n    \u003cdiv class=\"modal\" id=\"modal-add-member\"\u003e\u003cdiv class=\"modal-p\"\u003e\n      \u003cdiv class=\"mtit\"\u003eAdd team member\u003c/div\u003e\u003cdiv class=\"msub\"\u003eCreate a new account for your team.\u003c/div\u003e\n      \u003cdiv class=\"form-row\"\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eFull name *\u003c/label\u003e\u003cinput class=\"finp\" id=\"nm-name\" placeholder=\"e.g. Amit Sharma\"/\u003e\u003c/div\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eJob title\u003c/label\u003e\u003cinput class=\"finp\" id=\"nm-title\" placeholder=\"e.g. Content Manager\"/\u003e\u003c/div\u003e\u003c/div\u003e\n      \u003cdiv class=\"form-row\"\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eUsername *\u003c/label\u003e\u003cinput class=\"finp\" id=\"nm-user\" placeholder=\"e.g. amit\"/\u003e\u003c/div\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eRole\u003c/label\u003e\u003cselect class=\"fsel\" id=\"nm-role\"\u003e\u003coption value=\"super-admin\"\u003eSuper Admin\u003c/option\u003e\u003coption value=\"sam\"\u003eSAM — Strategic Account Manager\u003c/option\u003e\u003coption value=\"specialist-seo\" selected\u003eSEO Specialist\u003c/option\u003e\u003coption value=\"specialist-graphic\"\u003eGraphic Specialist\u003c/option\u003e\u003coption value=\"specialist-video\"\u003eVideo Specialist\u003c/option\u003e\u003coption value=\"specialist-content\"\u003eContent Specialist\u003c/option\u003e\u003coption value=\"owner\"\u003eOwner — Brand Stakeholder / Client\u003c/option\u003e\u003coption value=\"co-owner\"\u003eCo-Owner — Brand Co-Stakeholder\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\u003c/div\u003e\n      \u003cdiv class=\"form-row\"\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003ePassword *\u003c/label\u003e\u003cinput class=\"finp\" id=\"nm-pass\" type=\"password\" placeholder=\"Min 6 characters\"/\u003e\u003c/div\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eAvatar colour\u003c/label\u003e\u003cinput type=\"color\" class=\"finp\" id=\"nm-color\" value=\"#7c6af7\" style=\"height:40px;padding:4px 6px;cursor:pointer\"/\u003e\u003c/div\u003e\u003c/div\u003e\n      \u003cdiv class=\"fg2\" style=\"margin-bottom:12px\"\u003e\u003clabel class=\"flbl\" style=\"margin-bottom:8px\"\u003eAssign brands (optional)\u003c/label\u003e\u003cdiv class=\"balist\" id=\"new-member-brands\"\u003e\u003c/div\u003e\u003c/div\u003e\n      \u003cdiv class=\"macts\"\u003e\u003cbutton class=\"mbtn c\" onclick=\"closeModal()\"\u003eCancel\u003c/button\u003e\u003cbutton class=\"mbtn ok\" onclick=\"saveMember()\"\u003eCreate account →\u003c/button\u003e\u003c/div\u003e\n    \u003c/div\u003e\u003c/div\u003e\n\n    \u003c!-- Edit member --\u003e\n    \u003cdiv class=\"modal\" id=\"modal-edit-member\"\u003e\u003cdiv class=\"modal-p\"\u003e\n      \u003cdiv class=\"mtit\"\u003eEdit member\u003c/div\u003e\u003cdiv class=\"msub\" id=\"edit-member-sub\"\u003e\u003c/div\u003e\n      \u003cdiv class=\"form-row\"\u003e\u003cdiv class=\"fg2\"\u003e\u003clabel class=\"flbl\"\u003eFull name *\u003c/label\u003e\u003cinput class=\"finp\" id=\"em-name\"/\u003e\ 'var(--accent)',4000);\n  }\n});\n\nloadData();\napplyTheme();\ndocument.addEventListener('DOMContentLoaded',buildDemoList);\nif(document.readyState!=='loading')buildDemoList();\nfunction buildLookups(){\n  if(!isSAM(CU))return;\n  const el=document.getElementById('lookups-body');if(!el)return;\n\n  const LOOKUP_DEFS=[\n    {key:'objectives',    label:'Campaign objectives',      icon:'🎯', desc:'Options in the campaign objective dropdown'},\n    {key:'formats',       label:'Content formats',          icon:'🖼', desc:'Format options in planning rows (Static image, Video etc)'},\n    {key:'platforms',     label:'Platforms',                icon:'📱', desc:'Platform options in planning rows and campaign M field'},\n    {key:'activities',    label:'Activity types',           icon:'⚡', desc:'Activity options in planning rows (Social Media, PR etc)'},\n    {key:'currencies',    label:'Currencies',               icon:'💰', desc:'Currency symbols in budget field'},\n    {key:'industries',    label:'Industries',               icon:'🏭', desc:'Industry options when creating brands'},\n    {key:'focusAreas',    label:'Focus areas',              icon:'📌', desc:'Focus area options for monthly planning (AF-X, ISV, DES etc)'},\n    {key:'g1Deliverables',label:'G1 — Brand deliverables',  icon:'🎨', desc:'Deliverable options under G1 Brand Guidelines activity'},\n    {key:'g2WorkTypes',   label:'G2 — Website work types',  icon:'🌐', desc:'Work type options under G2 Website activity'},\n    {key:'g3SeoFocus',    label:'G3 — SEO focus areas',     icon:'🔍', desc:'SEO focus options under G3 SEO activity'},\n    {key:'timeActivities',label:'Time log activity types',   icon:'⏱', desc:'Activity types for SAM/BM time logging per brand'},\n    {key:'campaignLibrary',label:'Campaign library',         icon:'🎯', desc:'Predefined campaign names in the New Campaign wizard — add, edit or remove options'},\n  ];\n\n  const mb=LOOKUPS.milestoneBuffers||{briefToApproval:3,approvalToDesign:5,designToFinal:5,finalToPost:2};\n  const bufHtml='\u003cdiv style=\"background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px\"\u003e'\n    +'\u003cdiv style=\"display:flex;align-items:center;gap:8px;margin-bottom:12px\"\u003e\u003cspan\u003e📅\u003c/span\u003e\u003cdiv\u003e\u003cdiv style=\"font-size:13px;font-weight:600\"\u003eMilestone buffers\u003c/div\u003e\u003cdiv style=\"font-size:11px;color:var(--text3)\"\u003eDays between milestones — auto-calculated from post date\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e'\n    +'\u003cdiv style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px\"\u003e'\n    +'\u003cdiv style=\"background:var(--bg3);border:.5px solid var(--border);border-radius:var(--rsm);padding:8px\"\u003e\u003cdiv style=\"font-size:10px;color:var(--text3);margin-bottom:4px\"\u003e📋 Brief → ✅ Brief approval\u003c/div\u003e\u003cdiv style=\"display:flex;align-items:center;gap:6px\"\u003e\u003cinput type=\"number\" min=\"1\" max=\"30\" value=\"'+mb.briefToApproval+'\" id=\"buf-briefToApproval\" style=\"width:50px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rsm);padding:3px 6px;font-size:13px;color:var(--text);text-align:center\"\u003e \u003cspan style=\"font-size:11px;color:var(--text3)\"\u003edays\u003c/span\u003e\u003c/div\u003e\u003c/div\u003e'\n    +'\u003cdiv style=\"background:var(--bg3);border:.5px solid var(--border);border-radius:var(--rsm);padding:8px\"\u003e\u003cdiv style=\"font-size:10px;color:var(--text3);margin-bottom:4px\"\u003e✅ Brief approval → 🎨 Design\u003c/div\u003e\u003cdiv style=\"display:flex;align-items:center;gap:6px\"\u003e\u003cinput type=\"number\" min=\"1\" max=\"30\" value=\"'+mb.approvalToDesign+'\" id=\"buf-approvalToDesign\" style=\"width:50px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rsm);padding:3px 6px;font-size:13px;color:var(--text);text-align:center\"\u003e \u003cspan style=\"font-size:11px;col erHTML=`\u003cinput id=\"lookup-new-${key}\" placeholder=\"Type and press Enter...\" style=\"background:none;border:none;outline:none;font-family:var(--font);font-size:12px;color:var(--text);width:160px\" autofocus\u003e\n    \u003cbutton onclick=\"saveLookupNewItem('${key}')\" style=\"background:var(--accent);border:none;border-radius:4px;color:#fff;font-size:10px;padding:2px 7px;cursor:pointer;font-family:var(--font)\"\u003eAdd\u003c/button\u003e\n    \u003cbutton onclick=\"this.closest('.lookup-add-input').remove()\" style=\"background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;line-height:1\"\u003e×\u003c/button\u003e`;\n  container.appendChild(row);\n  setTimeout(()=\u003e{\n    const inp=document.getElementById('lookup-new-'+key);\n    if(inp){inp.focus();inp.addEventListener('keydown',e=\u003e{if(e.key==='Enter')saveLookupNewItem(key);if(e.key==='Escape')row.remove();});}\n  },50);\n}\n\nfunction saveLookupNewItem(key){\n  const inp=document.getElementById('lookup-new-'+key);if(!inp)return;\n  const val=inp.value.trim();\n  if(!val){inp.focus();return;}\n  if(!LOOKUPS[key])LOOKUPS[key]=[];\n  if(LOOKUPS[key].map(x=\u003ex.toLowerCase()).includes(val.toLowerCase())){toast('Already exists','var(--amber)');inp.focus();return;}\n  LOOKUPS[key].push(val);\n  persist();buildLookups();\n  toast('✓ Added: '+val,'var(--green)');\n}\n\nfunction editLookupItem(key,idx){\n  const container=document.getElementById('lookup-items-'+key);if(!container)return;\n  const chips=container.querySelectorAll('[data-lookup-idx]');\n  const chip=container.querySelector(`[data-lookup-idx=\"${idx}\"]`);if(!chip)return;\n  const old=LOOKUPS[key][idx];\n  // Replace chip with inline edit\n  const row=document.createElement('div');\n  row.style.cssText='display:flex;align-items:center;gap:6px;padding:3px 8px;background:var(--acbg);border:1.5px solid var(--accent);border-radius:var(--rsm)';\n  row.innerHTML=`\u003cinput id=\"lookup-edit-${key}-${idx}\" value=\"${old}\" style=\"background:none;border:none;outline:none;font-family:var(--font);font-size:12px;color:var(--text);width:160px\"\u003e\n    \u003cbutton onclick=\"saveLookupEdit('${key}',${idx},this)\" style=\"background:var(--accent);border:none;border-radius:4px;color:#fff;font-size:10px;padding:2px 7px;cursor:pointer;font-family:var(--font)\"\u003eSave\u003c/button\u003e\n    \u003cbutton onclick=\"buildLookups()\" style=\"background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;line-height:1\"\u003e×\u003c/button\u003e`;\n  chip.replaceWith(row);\n  const inp=document.getElementById(`lookup-edit-${key}-${idx}`);\n  if(inp){inp.focus();inp.select();inp.addEventListener('keydown',e=\u003e{if(e.key==='Enter')saveLookupEdit(key,idx,inp);if(e.key==='Escape')buildLookups();});}\n}\n\nfunction saveLookupEdit(key,idx,el){\n  const inp=el.closest('div').querySelector('input');if(!inp)return;\n  const val=inp.value.trim();\n  if(!val||val===LOOKUPS[key][idx]){buildLookups();return;}\n  LOOKUPS[key][idx]=val;\n  persist();buildLookups();\n  toast('✓ Updated','var(--green)');\n}\n\n// ── \"Other\" option handler for lookup dropdowns ──\n// Usage: \u003cselect onchange=\"handleOtherSelect(this,'custom-input-id')\"\u003e\nfunction handleOtherSelect(selectEl, customInputId){\n  const wrap=document.getElementById(customInputId);\n  if(!wrap)return;\n  if(selectEl.value==='Other'||selectEl.value==='other'){\n    wrap.style.display='flex';\n    wrap.querySelector('input')?.focus();\n  } else {\n    wrap.style.display='none';\n    const inp=wrap.querySelector('input');\n    if(inp)inp.value='';\n  }\n}\n// Build a select with Other+textbox pattern\nfunction buildSelectWithOther(items, selectedVal, id, onchangeExtra){\n  const opts=items.map(v=\u003e`\u003coption value=\"${v}\" ${v===selectedVal?'selected':''}\u003e${v}\u003c/option\u003e`).join('');\n  const isOther=selectedVal\u0026\u0026!items.includes(selectedVal)\u0026\u0026selectedVal!=='';\n  const customId=id+'-custom-wrap';\n  return `\u003cselect class=\"fsel\" id=\"${id}\" onchange=\"handleOtherSelect(this,'${customId}')${onchangeExtra?';'+onchangeExtra:''}\"\u003e\n    \u003coption value=\"\"\u003e— Select —\u003c/option\u003e\n    ${opts}\n    \u003coption value=\"Other\" ${isOther?'selected':''}\u003eOther (custom)\u003c/option\u003e\n  \u003c/select\u003e\n  \u003cdiv id=\"${customId}\" style=\"display:${isOther?'flex':'none'};align-items:center;gap:6px;margin-top:6px\"\u003e\n    \u003cinput class=\"finp\" placeholder=\"Type custom value...\" value=\"${isOther?selectedVal:''}\" style=\"flex:1\" oninput=\"document.getElementById('${id}').dataset.custom=this.value\"\u003e\n  \u003c/div\u003e`;\n}\nfunction getSelectWithOtherValue(id){\n  const el=document.getElementById(id);if(!el)return '';\n  if(el.value==='Other'||el.value==='other'){\n    const inp=document.getElementById(id+'-custom-wrap')?.querySelector('input');\n    return inp?inp.value.trim():el.dataset.custom||'';\n  }\n  return el.value;\n}\n\nfunction removeLookupItem(key,idx){\n  const item=LOOKUPS[key][idx];\n  if(!confirm('Remove \"'+item+'\" from '+key+'?'))return;\n  LOOKUPS[key].splice(idx,1);\n  persist();buildLookups();\n  toast('Removed: '+item,'var(--amber)');\n}\n\n\nfunction renderBriefCal(selectedDate, bid, ci, pi){\n  const wrap=document.getElementById('brief-cal-wrap');\n  const el=document.getElementById('brief-cal');\n  if(!wrap||!el)return;\n  wrap.style.display='block';\n  wrap.style.display='block';\n\n\n  // Get current month from selected date or today\n  const base=(selectedDate\u0026\u0026selectedDate.length\u003e=7)?new Date(selectedDate+'T12:00:00'):new Date();\n  const year=base.getFullYear();\n  const month=base.getMonth();\n  const mk=year+'-'+String(month+1).padStart(2,'0');\n  const daysInMonth=new Date(year,month+1,0).getDate();\n  const firstDay=new Date(year,month,1).getDay();\n  const monthLabel=new Date(year,month,1).toLocaleDateString('en-IN',{month:'long',year:'numeric'});\n\n  // Collect all other pieces' post dates for this brand/month\n  const b=BRANDS.find(x=\u003ex.id==bid);\n  const occupiedDates={};\n  if(b){\n    b.campaigns.forEach(function(camp,campIdx){\n      (camp.contentPieces||[]).forEach(function(piece,pieceIdx){\n        if(piece.postDate\u0026\u0026piece.postDate.startsWith(mk)){\n          if(campIdx===parseInt(ci)\u0026\u0026pieceIdx===parseInt(pi))return; // skip current piece\n          if(!occupiedDates[piece.postDate])occupiedDates[piece.postDate]=[];\n          occupiedDates[piece.postDate].push(piece);\n        }\n      });\n    });\n  }\n\n  // Current piece platform\n  const currPiece=b\u0026\u0026b.campaigns[ci]?b.campaigns[ci].contentPieces[pi]:null;\n  const currPlatforms=currPiece?(currPiece.platforms\u0026\u0026currPiece.platforms.length?currPiece.platforms:[currPiece.platform||'']).filter(Boolean):[];\n\n  const SICONS={'Video':'🎬','Reel':'🎬','Static image':'🖼','Carousel':'🎠','Article':'📝','Blog':'📝','Infographic':'📊','Story':'⭕','Podcast':'🎙'};\n\n  var html='\u003cdiv style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px\"\u003e'\n    +'\u003cbutton onclick=\"shiftBriefCal(-1,this.dataset.sel,this.dataset.bid,this.dataset.ci,this.dataset.pi)\" data-sel=\"'+selectedDate+'\" data-bid=\"'+bid+'\" data-ci=\"'+ci+'\" data-pi=\"'+pi+'\" style=\"background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:0 4px\"\u003e◀\u003c/button\u003e'\n    +'\u003cspan style=\"font-size:11px;font-weight:600;color:var(--text2)\"\u003e'+monthLabel+'\u003c/span\u003e'\n    +'\u003cbutton onclick=\"shiftBriefCal(1,this.dataset.sel,this.dataset.bid,this.dataset.ci,this.dataset.pi)\" data-sel=\"'+selectedDate+'\" data-bid=\"'+bid+'\" data-ci=\"'+ci+'\" data-pi=\"'+pi+'\" style=\"background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:0 4px\"\u003e▶\u003c/button\u003e'\n    +'\u003c/div\u003e'\n    +'\u003cdiv style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:2px\"\u003e';\n\n  ['S','M','T','W','T','F','S'].forEach(function(d){\n    html+='\u003cdiv style=\"text-align:center;font-size:9px;color:var(--text3);padding:2px\"\u003e'+d+'\u003c/div\u003e';\n  });\n\n  for(var i=0;i\u003cfirstDay;i++) html+='\u003cdiv\u003e\u003c/div\u003e';\n\n  for(var day=1;day\u003c=daysInMonth;day++){\n    const dateStr=mk+'-'+String(day).padStart(2,'0');\n    const isSelected=dateStr===selectedDate;\n    const pieces=occupiedDates[dateStr]||[];\n    const today=new Date().toISOString().split('T')[0];\n    const isToday=dateStr===today;\n\n    // Check if current piece platform clashes with existing pieces on this day\n    var hasClash=false;\n    if(currPlatforms.length\u0026\u0026pieces.length){\n      pieces.forEach(function(piece){\n        const pPlats=piece.platforms\u0026\u0026piece.platforms.length?piece.platforms:[piece.platform||''];\n        currPlatforms.forEach(function(cp){\n          if(pPlats.includes(cp))hasClash=true;\n        });\n      });\n    }\n\n    const bg=isSelected?'var(--accent)':hasClash?'var(--rbg)':pieces.length?'var(--acbg)':isToday?'var(--bg4)':'var(--bg2)';\n    const col=isSelected?'#fff':hasClash?'var(--red)':pieces.length?'var(--accent2)':isToday?'var(--accent)':'var(--text2)';\n    const bdr=isSelected?'var(--accent)':hasClash?'var(--rborder)':pieces.length?'var(--acb)':'var(--border)';\n\n    html+='\u003cdiv style=\"min-height:36px;background:'+bg+';border:.5px solid '+bdr+';border-radius:3px;padding:2px;cursor:pointer;text-align:center\" '\n      +'data-date=\"'+dateStr+'\" data-bid=\"'+bid+'\" data-ci=\"'+ci+'\" data-pi=\"'+pi+'\" '\n      +'onclick=\"pickBriefCalDate(this.dataset.date,this.dataset.bid,this.dataset.ci,this.dataset.pi)\"\u003e'\n      +'\u003cdiv style=\"font-size:10px;font-weight:'+(isSelected||isToday?'700':'400')+';color:'+col+'\"\u003e'+day+'\u003c/div\u003e'\n      +pieces.slice(0,2).map(function(piece){return'\u003cdiv style=\"font-size:8px;color:'+col+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap\"\u003e'+(SICONS[piece.creativeStyle]||'📄')+'\u003c/div\u003e';}).join('')\n      +(hasClash?'\u003cdiv style=\"font-size:8px;color:var(--red)\"\u003e⚠\u003c/div\u003e':'')\n      +'\u003c/div\u003e';\n  }\n  html+='\u003c/div\u003e';\n\n  // Clash warning\n  if(selectedDate\u0026\u0026occupiedDates[selectedDate]\u0026\u0026occupiedDates[selectedDate].length){\n    const clashPieces=occupiedDates[selectedDate];\n    const clashPlats=[];\n    var clashMsg='';\n    clashPieces.forEach(function(piece){\n      const pPlats=piece.platforms\u0026\u0026piece.platforms.length?piece.platforms:[piece.platform||''];\n      pPlats.forEach(function(pl){\n        if(currPlatforms.includes(pl)\u0026\u0026!clashPlats.includes(pl))clashPlats.push(pl);\n      });\n    });\n    if(clashPlats.length){\n      clashMsg='\u003cdiv style=\"margin-top:6px;padding:5px 8px;background:var(--rbg);border:.5px solid var(--rborder);border-radius:var(--rsm);font-size:10px;color:var(--red)\"\u003e⚠ '+clashPlats.join(', ')+' already has '+(clashPieces.length)+' piece'+(clashPieces.length\u003e1?'s':'')+' on this day\u003c/div\u003e';\n    } else {\n      clashMsg='\u003cdiv style=\"margin-top:6px;padding:5px 8px;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--rsm);font-size:10px;color:var(--text3)\"\u003e'+clashPieces.length+' other piece'+(clashPieces.length\u003e1?'s':'')+' on this day (different platform ✓)\u003c/div\u003e';\n    }\n    html+=clashMsg;\n  }\n\n  el.innerHTML=html;\n}\n\nfunction pickBriefCalDate(dateStr,bid,ci,pi){\n  const inp=document.getElementById('cp-post-date');\n  if(inp){\n    inp.value=dateStr;\n    // Trigger milestone calculation\n    if(dateStr){\n      const d=calcMilestonesFromPost(dateStr);\n      document.getElementById('cp-brief-date').value=d.briefDue;\n      document.getElementById('cp-brief-approval-date').value=d.briefApproval;\n      document.getElementById('cp-design-date').value=d.designDue;\n      document.getElementById('cp-approval-date').value=d.approvalDue;\n    }\n  }\n  renderBriefCal(dateStr,bid,ci,pi);\n}\n\nfunction shiftBriefCal(dir,selectedDate,bid,ci,pi){\n  // Shift calendar by 1 month\n  const base=(selectedDate\u0026\u0026selectedDate.length\u003e=7)?new Date(selectedDate+'T12:00:00'):new Date();\n  base.setMonth(base.getMonth()+dir);\n  const fakeDate=base.getFullYear()+'-'+String(base.getMonth()+1).padStart(2,'0')+'-01';\n  renderBriefCal(selectedDate||fakeDate,bid,ci,pi);\n  // Store shifted month in calendar div\n  document.getElementById('brief-cal').dataset.viewMonth=fakeDate;\n}\n\n\n// ══════════════════════════════════════════\n// OWNER FLOW\n// ══════════════════════════════════════════\n\n// ── Reusable: build Owner / Co-Owner / Both radio UI for any brand ──\nfunction buildOwnerRecipientUI(bid,namePrefix){\n  namePrefix=namePrefix||'owner-recipient';\n  const owners=MEMBERS.filter(m=\u003em.active\u0026\u0026['owner','client','brand-owner','co-owner','coowner'].includes(m.role)\u0026\u0026m.brands\u0026\u0026m.brands.some(x=\u003ex==bid));\n  const hasOwner=owners.some(m=\u003e['owner','client','brand-owner'].includes(m.role));\n  const hasCoOwner=owners.some(m=\u003e['co-owner','coowner'].includes(m.role));\n  const ownerName=owners.find(m=\u003e['owner','client','brand-owner'].includes(m.role))?.name||'Owner';\n  const coOwnerName=owners.find(m=\u003e['co-owner','coowner'].includes(m.role))?.name||'Co-Owner';\n  if(!hasOwner\u0026\u0026!hasCoOwner)return '\u003cdiv style=\"font-size:12px;color:var(--amber);padding:8px\"\u003e⚠ No owner assigned to this brand\u003c/div\u003e';\n  if(hasOwner\u0026\u0026!hasCoOwner){\n    return `\u003cdiv style=\"padding:8px 12px;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--rsm);font-size:12px;color:var(--text2)\"\u003e\n      \u003cinput type=\"hidden\" name=\"${namePrefix}\" value=\"owner\"\u003e\n      👤 ${ownerName} \u003cspan style=\"font-size:10px;color:var(--text3)\"\u003e(Brand Owner)\u003c/span\u003e\n    \u003c/div\u003e`;\n  }\n  if(!hasOwner\u0026\u0026hasCoOwner){\n    return `\u003cdiv style=\"padding:8px 12px;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--rsm);font-size:12px;color:var(--text2)\"\u003e\n      \u003cinput type=\"hidden\" name=\"${namePrefix}\" value=\"coowner\"\u003e\n      👤 ${coOwnerName} \u003cspan style=\"font-size:10px;color:var(--text3)\"\u003e(Co-Owner)\u003c/span\u003e\n    \u003c/div\u003e`;\n  }\n  // Both exist — show radio options\n  return `\u003cdiv style=\"display:flex;gap:6px\"\u003e\n    \u003clabel style=\"flex:1;display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--rsm);cursor:pointer\"\u003e\n      \u003cinput type=\"radio\" name=\"${namePrefix}\" value=\"owner\" checked style=\"accent-color:var(--accent)\"\u003e\n      \u003cdiv\u003e\u003cdiv style=\"font-size:12px;font-weight:500\"\u003eOwner\u003c/div\u003e\u003cdiv style=\"font-size:10px;color:var(--text3)\"\u003e${ownerName}\u003c/div\u003e\u003c/div\u003e\n    \u003c/label\u003e\n    \u003clabel style=\"flex:1;display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--rsm);cursor:pointer\"\u003e\n      \u003cinput type=\"radio\" name=\"${namePrefix}\" value=\"coowner\" style=\"accent-color:var(--accent)\"\u003e\n      \u003cdiv\u003e\u003cdiv style=\"font-size:12px;font-weight:500\"\u003eCo-Owner\u003c/div\u003e\u003cdiv style=\"font-size:10px;color:var(--text3)\"\u003e${coOwnerName}\u003c/div\u003e\u003c/div\u003e\n    \u003c/label\u003e\n    \u003clabel style=\"flex:1;display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--rsm);cursor:pointer\"\u003e\n      \u003cinput type=\"radio\" name=\"${namePrefix}\" value=\"both\" style=\"accent-color:var(--accent)\"\u003e\n      \u003cdiv style=\"font-size:12px;font-weight:500\"\u003eBoth\u003c/div\u003e\n    \u003c/label\u003e\n  \u003c/div\u003e`;\n}\nfunction getSelectedRecipient(namePrefix){\n  namePrefix=namePrefix||'owner-recipient';\n  return document.querySelector(`input[name=\"${namePrefix}\"]:checked`)?.value||document.querySelector(`input[name=\"${namePrefix}\"]`)?.value||'owner';\n}\n\n// SAM opens \"Send to Owner\" modal — choose what to send + who\nfunction openSendToOwnerModal(bid,ci){\n  const b=BRANDS.find(x=\u003ex.id==bid);if(!b)return;\n  const camp=b.campaigns[ci];if(!camp)return;\n  const pieces=(camp.contentPieces||[]);\n  const owners=MEMBERS.filter(m=\u003em.active\u0026\u0026['owner','co-owner','coowner','client','brand-owner'].includes(m.role)\u0026\u0026m.brands\u0026\u0026m.brands.some(x=\u003ex==bid));\n  if(!owners.length){toast('⚠ No owner assigned to this brand. Assign one in Team settings.','var(--amber)');return;}\n  const hasPieces=pieces.length\u003e0;\n  const mo=document.createElement('div');mo.id='modal-send-owner';mo.className='moverlay open';\n  mo.innerHTML=`\u003cdiv class=\"modal\" style=\"display:block;position:relative;margin:auto;top:auto;transform:none;max-width:520px\"\u003e\u003cdiv class=\"modal-p\"\u003e\n    \u003cdiv class=\"mtit\"\u003e📤 Send to Owner\u003c/div\u003e\n    \u003cdiv class=\"msub\"\u003e${camp.name} · ${b.name}\u003c/div\u003e\n    \u003cdiv style=\"margin:16px 0 12px\"\u003e\n      \u003cdiv style=\"font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px\"\u003eWhat to send\u003c/div\u003e\n      \u003clabel style=\"display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--rsm);margin-bottom:6px;cursor:pointer\"\u003e\n        \u003cinput type=\"checkbox\" id=\"send-camp-setup\" checked style=\"margin-top:2px;accent-color:var(--accent)\"\u003e\n        \u003cdiv\u003e\u003cdiv style=\"font-size:12px;font-weight:600\"\u003e📋 Campaign setup\u003c/div\u003e\n        \u003cdiv style=\"font-size:11px;color:var(--text3);margin-top:2px\"\u003e${[camp.T?'T: '+camp.T.substring(0,40):'',camp.E?'E: '+camp.E.substring(0,40):'',camp.outcome?'Outcome: '+camp.outcome.substring(0,40):''].filter(Boolean).join(' · ')||'T, E, Objective, Outcome, Creative plan'}\u003c/div\u003e\u003c/div\u003e\n      \u003c/label\u003e\n      ${hasPieces?`\u003clabel style=\"display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--rsm);cursor:pointer\"\u003e\n        \u003cinput type=\"checkbox\" id=\"send-all-pieces\" style=\"margin-top:2px;accent-color:var(--accent)\"\u003e\n        \u003cdiv\u003e\u003cdiv style=\"font-size:12px;font-weight:600\"\u003e📄 All content pieces (${pieces.length})\u003c/div\u003e\n        \u003cdiv style=\"font-size:11px;color:var(--text3);margin-top:2px\"\u003e${pieces.map(p=\u003ep.topic||p.creativeStyle||'Untitled').slice(0,4).join(' · ')}${pieces.length\u003e4?' +more':''}\u003c/div\u003e\u003c/div\u003e\n      \u003c/label\u003e`:''}\n    \u003c/div\u003e\n    \u003cdiv style=\"margin-bottom:16px\"\u003e\n      \u003cdiv style=\"font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px\"\u003eSend to\u003c/div\u003e\n      ${buildOwnerRecipientUI(bid)}\n    \u003c/div\u003e\n    \u003cdiv class=\"macts\"\u003e\n      \u003cbutton class=\"mbtn c\" onclick=\"document.getElementById('modal-send-owner').remove()\"\u003eCancel\u003c/button\u003e\n      \u003cbutton class=\"mbtn ok\" onclick=\"confirmSendToOwner('${bid}',${ci})\"\u003e📤 Send now\u003c/button\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\u003c/div\u003e`;\n  document.body.appendChild(mo);\n}\n\nfunction confirmSendToOwner(bid,ci){\n  const b=BRANDS.find(x=\u003ex.id==bid);if(!b)return;\n  const camp=b.campaigns[ci];if(!camp)return;\n  const sendCamp=document.getElementById('send-camp-setup')?.checked;\n  const sendPieces=document.getElementById('send-all-pieces')?.checked;\n  const recipient=getSelectedRecipient('owner-recipient');\n  if(!sendCamp\u0026\u0026!sendPieces){toast('⚠ Select at least one item to send','var(--amber)');return;}\n  const now=new Date().toISOString();\n  if(sendCamp){\n    camp.sentToOwner=true;camp.sentToOwnerBy=CU.name;camp.sentToOwnerAt=now;\n    camp.sentToOwnerRecipient=recipient;camp.ownerStatus='pending';\n  }\n  if(sendPieces){\n    (camp.contentPieces||[]).forEach(p=\u003e{\n      if(p.copyDir||p.copy||p.topic){\n        p.status='pending';p.sentToOwnerBy=CU.name;p.sentToOwnerAt=now;\n      }\n    });\n  }\n  addNotification('pending',`Campaign \"${camp.name}\" sent to owner for review`,bid,null,null);\n  persist();buildWsMonthly(b);buildApprovals();\n  document.getElementById('modal-send-owner')?.remove();\n  toast(`📤 Sent to ${recipient==='both'?'owner \u0026 co-owner':recipient}`,'var(--amber)');\n}\n\n// Owner approves campaign setup\nfunction approveCampaignByOwner(bid,ci){\n  const b=BRANDS.find(x=\u003ex.id==bid);if(!b)return;\n  const camp=b.campaigns[ci];if(!camp)return;\n  const comment=(document.getElementById('camp-owner-comment-'+bid+'-'+ci)||{}).value||'';\n  camp.ownerStatus='approved';camp.ownerApprovedBy=CU.name;camp.ownerApprovedAt=new Date().toISOString();\n  if(comment){if(!camp.ownerComments)camp.ownerComments=[];camp.ownerComments.push({text:comment,by:CU.name,at:new Date().toISOString(),type:'approval'});}\n  addNotification('approved',`Campaign \"${camp.name}\" approved by ${CU.name}`,bid,null,null);\n  persist();buildApprovals();\n  toast('✅ Campaign setup approved','var(--green)');\n}\n\n// Owner requests changes on campaign\nfunction requestCampaignChanges(bid,ci){\n  const b=BRANDS.find(x=\u003ex.id==bid);if(!b)return;\n  const camp=b.campaigns[ci];if(!camp)return;\n  const comment=(document.getElementById('camp-owner-comment-'+bid+'-'+ci)||{}).value||'';\n  if(!comment.trim()){toast('⚠ Add a comment explaining what needs to change','var(--amber)');return;}\n  camp.ownerStatus='changes';\n  if(!camp.ownerComments)camp.ownerComments=[];\n  camp.ownerComments.push({text:comment,by:CU.name,at:new Date().toISOString(),type:'changes'});\n  addNotification('changes',`Campaign \"${camp.name}\" — changes requested: ${comment.substring(0,60)}`,bid,null,null);\n  persist();buildApprovals();buildDashboard\u0026\u0026buildDashboard();\n  toast('❌ Changes requested — SAM notified','var(--red)');\n}\n\n// Owner comments on approved piece (no edit — comment only)\nfunction ownerCommentOnPiece(bid,ci,pi){\n  const b=BRANDS.find(x=\u003ex.id==bid);if(!b)return;\n  const p=b.campaigns[ci]?.contentPieces[pi];if(!p)return;\n  const el=document.getElementById(`owner-post-comment-${bid}-${ci}-${pi}`);\n  const comment=el?.value?.trim()||'';\n  if(!comment){toast('⚠ Add a comment first','var(--amber)');return;}\n  if(!p.ownerPostComments)p.ownerPostComments=[];\n  p.ownerPostComments.push({text:comment,by:CU.name,at:new Date().toISOString()});\n  addNotification('comment',`Owner commented on \"${p.topic}\": ${comment.substring(0,60)}`,bid,ci,pi);\n  persist();buildApprovals();\n  if(el)el.value='';\n  toast('💬 Comment sent to SAM','var(--accent)');\n}\n\n// SAM edits brief after owner approval → task resets to To Do + notifies assignee\nfunction samEditApprovedBrief(bid,ci,pi){\n  const b=BRANDS.find(x=\u003ex.id==bid);if(!b)return;\n  const p=b.campaigns[ci]?.contentPieces[pi];if(!p)return;\n  const mo=document.createElement('div');mo.id='modal-edit-approved';mo.className='moverlay open';\n  mo.innerHTML=`\u003cdiv class=\"modal\" style=\"display:block;position:relative;margin:auto;top:auto;transform:none;max-width:460px\"\u003e\u003cdiv class=\"modal-p\"\u003e\n    \u003cdiv class=\"mtit\"\u003e✏ Edit approved brief\u003c/div\u003e\n    \u003cdiv class=\"msub\"\u003e${p.topic||'Content piece'}\u003c/div\u003e\n    \u003cdiv style=\"padding:10px 12px;background:var(--ambg);border:.5px solid var(--amborder);border-radius:var(--rsm);font-size:12px;color:var(--amber);margin-bottom:14px\"\u003e⚠ Editing will reset the task to \u003cb\u003eTo Do\u003c/b\u003e and notify the assignee to restart.\u003c/div\u003e\n    \u003clabel class=\"flbl\"\u003eComment / reason for change *\u003c/label\u003e\n    \u003ctextarea class=\"ftxt\" id=\"edit-approved-comment\" style=\"min-height:64px\" placeholder=\"e.g. Owner requested friendlier tone, updated copy accordingly...\"\u003e\u003c/textarea\u003e\n    \u003cdiv class=\"macts\"\u003e\n      \u003cbutton class=\"mbtn c\" onclick=\"document.getElementById('modal-edit-approved').remove()\"\u003eCancel\u003c/button\u003e\n      \u003cbutton class=\"mbtn ok\" onclick=\"confirmSamEditApproved('${bid}',${ci},${pi})\"\u003eEdit brief →\u003c/button\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\u003c/div\u003e`;\n  document.body.appendChild(mo);\n  setTimeout(()=\u003edocument.getElementById('edit-approved-comment')?.focus(),100);\n}\n\nfunction confirmSamEditApproved(bid,ci,pi){\n  const comment=document.getElementById('edit-approved-comment')?.value?.trim();\n  if(!comment){toast('⚠ Comment is required','var(--amber)');return;}\n  const b=BRANDS.find(x=\u003ex.id==bid);if(!b)return;\n  const p=b.campaigns[ci]?.contentPieces[pi];if(!p)return;\n  // Reset piece to brief stage\n  p.status='brief';p.publishStatus='';\n  if(!p.feedbackHistory)p.feedbackHistory=[];\n  p.feedbackHistory.push({round:(p.feedbackHistory.length+1),comment:`[SAM edit] ${comment}`,by:CU.name,at:new Date().toISOString(),status:'edit'});\n  // Reset linked task to To Do and notify assignee\n  const linkedTask=TASKS.find(t=\u003et.brandId==b.id\u0026\u0026(String(t.contentPieceRef?.bid)===String(bid)\u0026\u0026t.contentPieceRef?.ci===ci\u0026\u0026t.contentPieceRef?.pi===pi||String(p.taskId)===String(t.id)));\n  if(linkedTask){\n    const prevStage=linkedTask.stage;linkedTask.stage='todo';linkedTask.specStage='todo';\n    if(linkedTask.briefData)linkedTask.briefData={...linkedTask.briefData,copyDir:p.copyDir,copy:p.copy,caption:p.caption,hashtags:p.hashtags};\n    const assignee=MEMBERS.find(m=\u003em.id==linkedTask.assigneeId);\n    addNotification('changes',`Brief updated for \"${linkedTask.title}\" by ${CU.name} — please review and restart: ${comment.substring(0,60)}`,b.id,null,null);\n    if(assignee)toast(`🔔 ${assignee.name} notified — task reset to To Do`,'var(--amber)');\n    syncPieceStatus(linkedTask);\n  }\n  persist();buildWsMonthly(b);buildWsContent\u0026\u0026buildWsContent(b);buildTaskViews();\n  document.getElementById('modal-edit-approved')?.remove();\n  toast('✏ Brief updated — task reset to To Do','var(--amber)');\n}\n\n// ══════════════════════════════════════════\n// OWNER DASHBOARD (replaces buildApprovals for owner role)\n// ══════════════════════════════════════════\nfunction buildOwnerDashboard(){\n  if(!CU)return;\n  const el=document.getElementById('screen-approvals');if(!el)return;\n  const myBrandsIds=((MEMBERS.find(m=\u003em.id==CU.id)||{}).brands||CU.brands||[]);\n  const myBrands=BRANDS.filter(b=\u003e!b.archived\u0026\u0026(!myBrandsIds.length||myBrandsIds.some(id=\u003eid==b.id)));\n  const now=new Date();const h=now.getHours();\n  const thisMonth=now.toISOString().substring(0,7);\n\n  // Greeting\n  const gEl=document.getElementById('owner-greeting');\n  if(gEl){const g=h\u003c12?'Good morning':h\u003c17?'Good afternoon':'Good evening';gEl.textContent=g+', '+CU.name.split(' ')[0]+' 👋';}\n\n  // Count stats\n  let pendingCount=0,approvedCount=0,activeCamps=0;\n  myBrands.forEach(b=\u003e{\n    if(b.campaigns){b.campaigns.forEach(c=\u003e{\n      if(c.status==='active')activeCamps++;\n      if(c.ownerStatus==='pending')pendingCount++;\n      (c.contentPieces||[]).forEach(p=\u003e{\n        if(p.status==='pending')pendingCount++;\n        if(p.status==='approved'\u0026\u0026(p.approvedAt||'').startsWith(thisMonth))approvedCount++;\n      });\n    });}\n  });\n  const spEl=document.getElementById('owner-stat-pending');const saEl=document.getElementById('owner-stat-approved');const scEl=document.getElementById('owner-stat-campaigns');\n  if(spEl)spEl.textContent=pendingCount;if(saEl)saEl.textContent=approvedCount;if(scEl)scEl.textContent=activeCamps;\n  const nb=document.getElementById('nb-approvals');if(nb)nb.textContent=pendingCount||'';\n  const sub=document.getElementById('approvals-subtitle');\n  if(sub)sub.textContent=pendingCount?`${pendingCount} item${pendingCount!==1?'s':''} need your review`:'All caught up — nothing pending';\n\n  // Build HTML\n  let pendingHtml='';let activeHtml='';let historyHtml='';\n\n  myBrands.forEach(b=\u003e{\n    const bColor=b.color||'var(--accent)';\n\n    // ── PENDING ITEMS ──\n    let bPending='';\n\n    // Campaign setup pending\n    (b.campaigns||[]).forEach((camp,ci)=\u003e{\n      if(!camp.sentToOwner||camp.ownerStatus!=='pending')return;\n      bPending+=buildOwnerCampaignCard(b,camp,ci,true);\n    });\n\n    // Content pieces pending\n    const pendingPieces=[];\n    (b.campaigns||[]).forEach((camp,ci)=\u003e{\n      (camp.contentPieces||[]).forEach((p,pi)=\u003e{\n        if(p.status==='pending')pendingPieces.push({p,pi,ci,camp});\n      });\n    });\n    if(pendingPieces.length){\n      bPending+=pendingPieces.map(({p,pi,ci,camp})=\u003ebuildOwnerPieceCard(b,camp,ci,pi,p,true)).join('');\n    }\n\n    if(bPending){\n      pendingHtml+=`\u003cdiv style=\"margin-bottom:20px\"\u003e\n        \u003cdiv style=\"display:flex;align-items:center;gap:8px;margin-bottom:10px\"\u003e\n          \u003cspan style=\"width:10px;height:10px;border-radius:50%;background:${bColor};display:inline-block;flex-shrink:0\"\u003e\u003c/span\u003e\n          \u003cspan style=\"font-size:14px;font-weight:700\"\u003e${b.name}\u003c/span\u003e\n          \u003cspan style=\"font-size:11px;color:var(--amber);background:var(--ambg);padding:2px 8px;border-radius:9px;border:.5px solid var(--amborder)\"\u003e⏳ Needs review\u003c/span\u003e\n        \u003c/div\u003e\n        ${bPending}\n      \u003c/div\u003e`;\n    }\n\n    // ── ACTIVE CAMPAIGNS ──\n    const activeCampaigns=(b.campaigns||[]).filter((c,ci)=\u003ec.status==='active'\u0026\u0026(!c.sentToOwner||c.ownerStatus!=='pending'));\n    if(activeCampaigns.length){\n      activeHtml+=`\u003cdiv style=\"margin-bottom:20px\"\u003e\n        \u003cdiv style=\"display:flex;align-items:center;gap:8px;margin-bottom:10px\"\u003e\n          \u003cspan style=\"width:10px;height:10px;border-radius:50%;background:${bColor};display:inline-block;flex-shrink:0\"\u003e\u003c/span\u003e\n          \u003cspan style=\"font-size:14px;font-weight:700\"\u003e${b.name}\u003c/span\u003e\n        \u003c/div\u003e\n        ${activeCampaigns.map((camp,_)=\u003e{\n          const ci=(b.campaigns||[]).indexOf(camp);\n          return buildOwnerCampaignCard(b,camp,ci,false);\n        }).join('')}\n      \u003c/div\u003e`;\n    }\n\n    // ── HISTORY ──\n    const histPieces=[];\n    (b.campaigns||[]).forEach((camp,ci)=\u003e{\n      (camp.contentPieces||[]).forEach((p,pi)=\u003e{\n        if(p.status==='approved'\u0026\u0026(p.publishStatus==='scheduled'||p.publishStatus==='published'))\n          histPieces.push({p,pi,ci,camp,b});\n      });\n    });\n    if(histPieces.length){\n      historyHtml+=`\u003cdiv style=\"margin-bottom:14px\"\u003e\n        \u003cdiv style=\"font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:6px\"\u003e\n          \u003cspan style=\"width:8px;height:8px;border-radius:50%;background:${bColor};display:inline-block\"\u003e\u003c/span\u003e${b.name}\n        \u003c/div\u003e\n        ${histPieces.map(({p,pi,ci,camp})=\u003e`\n          \u003cdiv style=\"display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rsm);margin-bottom:5px\"\u003e\n            \u003cspan style=\"font-size:14px\"\u003e${p.publishStatus==='published'?'📢':'🗓'}\u003c/span\u003e\n            \u003cdiv style=\"flex:1\"\u003e\u003cdiv style=\"font-size:12px;font-weight:500\"\u003e${p.topic||'Untitled'}\u003c/div\u003e\n              \u003cdiv style=\"font-size:10px;color:var(--text3)\"\u003e${camp.name}${p.platform?' · '+p.platform:''}${p.postDate?' · '+p.postDate:''}\u003c/div\u003e\n            \u003c/div\u003e\n            \u003cspan style=\"font-size:10px;padding:2px 8px;border-radius:9px;background:${p.publishStatus==='published'?'var(--gnbg)':'var(--acbg)'};color:${p.publishStatus==='published'?'var(--green)':'var(--accent2)'};border:.5px solid ${p.publishStatus==='published'?'var(--gnb)':'var(--acb)'}\"\u003e${p.publishStatus==='published'?'📢 Published':'🗓 Scheduled'}\u003c/span\u003e\n          \u003c/div\u003e`).join('')}\n      \u003c/div\u003e`;\n    }\n  });\n\n  const pendingEl=document.getElementById('approvals-pending');\n  const doneEl=document.getElementById('approvals-done');\n  if(!pendingEl)return;\n\n  // Empty state\n  if(!pendingHtml\u0026\u0026!activeHtml){\n    pendingEl.innerHTML=`\u003cdiv style=\"background:var(--gnbg);border:.5px solid var(--gnb);border-radius:var(--r);padding:28px;text-align:center;margin-bottom:16px\"\u003e\n      \u003cdiv style=\"font-size:28px;margin-bottom:8px\"\u003e✅\u003c/div\u003e\n      \u003cdiv style=\"font-size:14px;font-weight:600;color:var(--green)\"\u003eAll caught up!\u003c/div\u003e\n      \u003cdiv style=\"font-size:12px;color:var(--green);margin-top:4px\"\u003eNo pending approvals right now\u003c/div\u003e\n    \u003c/div\u003e`;\n    if(doneEl)doneEl.innerHTML=historyHtml?`\u003cdiv style=\"font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px\"\u003e📢 Published \u0026 Scheduled\u003c/div\u003e${historyHtml}`:'';\n    return;\n  }\n\n  pendingEl.innerHTML=(pendingHtml?`\u003cdiv style=\"font-size:13px;font-weight:700;color:var(--text);m
